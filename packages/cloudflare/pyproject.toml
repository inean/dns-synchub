[build-system]
  build-backend = "hatchling.build"
  requires = ["hatchling"]

[project]
  authors = [{ name = "Carlos Martín", email = "inean.es@gmail.com" }]
  dependencies = [
    "dns-synchub",
    "telemetry",
    # External dependencies
    "cloudflare < 2.20",
    "tenacity>=8.0.1",
  ]
  description = "Cloudflare Mapper for DNS Synchub"
  license = "MIT"
  name = "dns-synchub-cloudflare"
  readme = "README.md"
  requires-python = ">=3.13"
  version = "0.1a0"

  [project.entry-points.'dns_synchub.mappers']
    cloudflare = 'dns_synchub_cloudflare:CloudFlareDNSProvider'

[tool.uv.sources]
  dns-synchub = { workspace = true }
  telemetry = { workspace = true }
