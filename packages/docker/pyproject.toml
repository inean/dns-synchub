[build-system]
  build-backend = "hatchling.build"
  requires = ["hatchling"]

[project]
  authors = [{ name = "Carlos Martín", email = "inean.es@gmail.com" }]
  dependencies = [
    "dns-synchub",
    "telemetry",
    # External dependencies
    "docker>=7.1.0",
    "tenacity>=8.0.1",
  ]
  description = "Docker poller (sync) for DNS Synchub"
  license = "MIT"
  name = "dns-synchub-docker"
  readme = "README.md"
  requires-python = ">=3.13"
  version = "0.1a0"

  [project.entry-points.'dns_synchub.pollers']
    docker = 'dns_synchub_docker:DockerPoller'

[tool.uv]
  dev-dependencies = [
    "types-docker>=7.1.0",
  ]

  [tool.uv.sources]
    dns-synchub = { workspace = true }
    telemetry = { workspace = true }
